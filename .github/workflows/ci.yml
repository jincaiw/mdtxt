name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # v0.1.0 release targets: Windows x64, Ubuntu LTS x64 and Apple
        # Silicon macOS. Keep the ordinary gate on these explicit runners;
        # Windows ARM is not a declared target and must not be mistaken for
        # cross-platform release evidence. P10a.
        platform: [windows-latest, ubuntu-24.04, macos-14]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1
        # The stable toolchain installs with the minimal profile, which omits
        # clippy — request it explicitly so the lint step below has it.
        with:
          components: clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        # Caching is an optimization — a flaky GitHub cache service must never
        # fail the build (it took down a Windows release once).
        continue-on-error: true
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        # --frozen-lockfile makes CI fail if bun.lock doesn't match package.json,
        # so a PR can't silently swap or add dependencies without an obvious
        # lockfile diff to review.
        run: bun install --frozen-lockfile

      - name: Audit frontend dependencies
        run: bun audit --audit-level=high

      - name: Build frontend (tsc + vite)
        run: bun run build

      - name: Check Chinese translation completeness
        run: bun run check:i18n

      - name: Run frontend tests
        run: bun run test

      # clippy compiles the crate (so it subsumes `cargo check`) while also
      # failing the build on any lint warning, keeping the Rust side clean.
      - name: Lint Rust (clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # The ordinary Windows runner is a real NTFS environment. Configure its
      # test-only long-path, loopback UNC-share and sharing-violation fixtures
      # before Rust tests so P8 records OS behaviour instead of inferring it
      # from POSIX or an emulated filesystem.
      - name: Configure Windows filesystem evidence fixtures
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name LongPathsEnabled -Value 1
          $root = Join-Path $env:RUNNER_TEMP 'mdtxt-ntfs-evidence'
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          $share = "mdtxt-ci-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          Set-Service -Name LanmanServer -StartupType Manual
          Start-Service -Name LanmanServer
          New-SmbShare -Name $share -Path $root -FullAccess $env:USERNAME | Out-Null
          "MDTXT_TEST_UNC_ROOT=\\localhost\$share" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MDTXT_TEST_SMB_SHARE=$share" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $lockPath = Join-Path $root 'exclusive-lock.md'
          $readyPath = Join-Path $root 'exclusive-lock.ready'
          [System.IO.File]::WriteAllText($lockPath, 'locked original bytes')
          $script = "`$stream = [System.IO.File]::Open('$lockPath', [System.IO.FileMode]::Open, [System.IO.FileAccess]::ReadWrite, [System.IO.FileShare]::None); [System.IO.File]::WriteAllText('$readyPath', 'locked'); Start-Sleep -Seconds 300"
          $locker = Start-Process -FilePath powershell -ArgumentList '-NoProfile', '-Command', $script -PassThru
          for ($attempt = 0; $attempt -lt 30 -and -not (Test-Path $readyPath); $attempt++) { Start-Sleep -Milliseconds 250 }
          if (-not (Test-Path $readyPath)) { throw 'Timed out waiting for the exclusive Windows lock fixture.' }
          "MDTXT_TEST_LOCK_PATH=$lockPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MDTXT_TEST_LOCK_PID=$($locker.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test

      - name: Verify and clean Windows filesystem evidence fixtures
        if: ${{ always() && matrix.platform == 'windows-latest' }}
        shell: pwsh
        run: |
          if ($env:MDTXT_TEST_LOCK_PID) { Stop-Process -Id $env:MDTXT_TEST_LOCK_PID -Force -ErrorAction SilentlyContinue }
          if ($env:MDTXT_TEST_LOCK_PATH) {
            $contents = [System.IO.File]::ReadAllText($env:MDTXT_TEST_LOCK_PATH)
            if ($contents -ne 'locked original bytes') { throw 'Exclusive-lock save changed the original bytes.' }
          }
          if ($env:MDTXT_TEST_SMB_SHARE) { Remove-SmbShare -Name $env:MDTXT_TEST_SMB_SHARE -Force -ErrorAction SilentlyContinue }

  # ─── Supply-chain: Rust dependencies ──────────────────────────
  # Fails the build on a known-vulnerable crate (RUSTSEC advisory), a banned
  # crate, or a dependency pulled from anywhere other than crates.io. Config
  # lives in src-tauri/deny.toml. Runs once on Linux (not per-platform) since
  # it only reads Cargo.lock — it doesn't compile the project.
  cargo-deny:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check advisories, bans, and sources
        run: cargo deny --manifest-path src-tauri/Cargo.toml check advisories bans sources

  # ─── Supply-chain: known-vulnerability scan (npm + Cargo) ─────
  # Scans every lockfile in the repo against the OSV database and fails on any
  # package with a known vulnerability. Covers Bun and Rust lockfiles in one
  # pass.
  #
  # Tag verified against github.com/google/osv-scanner-action releases; Dependabot
  # (github-actions ecosystem) will keep it current.
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      # Report-only for now: the existing dependency tree already has known npm
      # advisories, so blocking would fail every PR on pre-existing debt. Results
      # still upload to the Security tab. Once the current vulns are cleaned up,
      # set this to true to make it a hard gate on newly-introduced vulnerabilities.
      fail-on-vuln: false
      scan-args: |-
        -r
        ./

  # Runs against a real Linux WebKit window, not the browser/dev fallback.
  # It covers the native app bootstrap and the first settings interaction;
  # OS dialogs, keychain prompts and updater installation remain intentionally
  # outside this non-interactive smoke path.
  native-smoke:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux WebView and WebDriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri WebDriver bridge
        run: cargo install tauri-driver --locked

      - name: Run native WebView smoke tests
        run: xvfb-run --auto-servernum bun run test:native
