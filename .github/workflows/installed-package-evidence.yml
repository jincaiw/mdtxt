name: Installed Package Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-recovery:
    name: Ubuntu installed recovery
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Install package and desktop-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb openbox dbus-x11 x11-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri WebDriver bridge
        run: cargo install tauri-driver --locked

      - name: Build production Debian package
        run: timeout --foreground --signal=TERM --kill-after=60s 30m bun run tauri build --verbose --bundles deb

      - name: Install production Debian package
        run: |
          package="$(find "$PWD/src-tauri/target/release/bundle/deb" -maxdepth 1 -name '*.deb' -print -quit)"
          test -n "$package"
          sha256sum "$package"
          sudo apt-get install -y "$package"
          test "$(dpkg-query -W -f='${Version}' mdtxt)" = "0.1.0"
          test -x /usr/bin/mdtxt

      - name: Force-kill and restore two installed-package drafts
        env:
          MDTXT_E2E_BINARY: /usr/bin/mdtxt
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" dbus-run-session -- bash -euxo pipefail -c '
            export GDK_BACKEND=x11
            export LIBGL_ALWAYS_SOFTWARE=1
            export WEBKIT_DISABLE_COMPOSITING_MODE=1
            openbox --sm-disable >/tmp/mdtxt-installed-openbox.log 2>&1 &
            for attempt in $(seq 1 50); do
              if xprop -root _NET_SUPPORTING_WM_CHECK | grep -q window; then break; fi
              sleep 0.1
            done
            xprop -root _NET_SUPPORTING_WM_CHECK | grep -q window
            bun scripts/linux-installed-recovery.mjs
          '

      - name: Upload installed recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-installed-recovery-${{ github.sha }}
          path: /tmp/mdtxt-ubuntu-installed-recovery.png
          if-no-files-found: error
          retention-days: 14

  windows-recovery-and-denied-share:
    name: Windows installed recovery and denied share
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build production MSI package
        run: bun run tauri build --verbose --bundles msi

      - name: Install production MSI package
        shell: powershell
        run: |
          $package = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          if ($null -eq $package) { throw 'Production MSI package was not built.' }
          Get-FileHash -Algorithm SHA256 $package.FullName
          $installer = Start-Process msiexec.exe -Wait -PassThru -ArgumentList @('/i', "`"$($package.FullName)`"", '/qn', '/norestart')
          if ($installer.ExitCode -ne 0) { throw "MSI installation failed with exit code $($installer.ExitCode)." }
          $candidates = @(
            "$env:ProgramFiles\mdtxt\mdtxt.exe",
            "${env:ProgramFiles(x86)}\mdtxt\mdtxt.exe",
            "$env:LOCALAPPDATA\mdtxt\mdtxt.exe",
            "$env:LOCALAPPDATA\Programs\mdtxt\mdtxt.exe"
          )
          $binary = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $binary) {
            $binary = Get-ChildItem $env:ProgramFiles, $env:LOCALAPPDATA -Filter mdtxt.exe -File -Recurse -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName -First 1
          }
          if (-not $binary) { throw 'Installed production mdtxt.exe was not found.' }
          $version = (Get-Item $binary).VersionInfo.ProductVersion
          if ($version -notlike '0.1.0*') { throw "Installed version is $version, expected 0.1.0." }
          "MDTXT_E2E_BINARY=$binary" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "MDTXT_INSTALLED_BINARY path=$binary version=$version"

      - name: Force-kill, restore, and validate denied-share UX
        run: bun scripts/windows-installed-recovery.mjs

      - name: Upload installed Windows evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installed-recovery-and-denied-share-${{ github.sha }}
          path: |
            ${{ runner.temp }}/mdtxt-windows-installed-recovery.png
            ${{ runner.temp }}/mdtxt-windows-denied-share.png
          if-no-files-found: error
          retention-days: 14
