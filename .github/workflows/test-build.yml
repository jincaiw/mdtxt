name: Test Build

# Manual TEST builds, for trying changes on a real machine without heating up
# a dev laptop and without cutting a release. Produces the Windows installers
# as run ARTIFACTS only: Actions tab -> Test Build -> Run workflow, then
# download the zip from the run page (collaborators only; nothing public, no
# tag, no version bump, no updater manifest — the in-app updater cannot see
# these builds). For a real release use release.yml.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        # Caching is an optimization — a flaky GitHub cache service must never
        # fail the build (mirrors ci.yml / release.yml).
        continue-on-error: true
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows bundles
        # The updater is intentionally disabled until mdtxt owns both an
        # endpoint and signing keys, so test bundles require no updater secret.
        run: bun run tauri build --target x86_64-pc-windows-msvc

      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdtxt-windows-x64-test
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
