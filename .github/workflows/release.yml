name: Release

# A release is an immutable, reproducible version: bump the three version
# manifests, update CHANGELOG.md, then push an annotated vX.Y.Z tag. A manual
# dispatch is retained for re-running a failed release of an existing tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v1.0.50"
        required: true
        type: string

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      notes: ${{ steps.release.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - id: release
        name: Verify version and prepare release notes
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          test "$tag" = "v$version"
          test "$(jq -r '.version' package.json)" = "$version"
          grep -q "^version = \"$version\"$" src-tauri/Cargo.toml
          notes="$(awk -v ver="## [$version]" '
            index($0, ver) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)"
          test -n "$(printf '%s' "$notes" | tr -d '[:space:]')"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "notes<<MDTXT_RELEASE_NOTES"
            printf '%s\n' "$notes"
            echo "MDTXT_RELEASE_NOTES"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            portable: true
          - platform: ubuntu-24.04
            # Ship the native Debian installer plus a portable AppImage. RPM is
            # not a v0.1.0 target and has repeatedly stalled after the Debian
            # bundle completed on GitHub-hosted Ubuntu runners.
            args: "--bundles deb,appimage"
            portable: false
          - platform: macos-latest
            args: ""
            portable: false
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: "./src-tauri -> target"
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bun run tauri
          tagName: ${{ needs.metadata.outputs.tag }}
          releaseName: "mdtxt ${{ needs.metadata.outputs.tag }}"
          releaseBody: ${{ needs.metadata.outputs.notes }}
          args: ${{ matrix.args }}
          # P11 must explicitly promote a verified release. Until then every
          # generated package remains a draft beta, never an implied GA.
          releaseDraft: true
          prerelease: true
          # mdtxt owns neither an updater endpoint nor signing keys yet.
          includeUpdaterJson: false
      - name: Upload Windows x64 Portable executable
        if: matrix.portable
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $source = "src-tauri/target/x86_64-pc-windows-msvc/release/mdtxt.exe"
          if (-not (Test-Path $source)) { throw "Portable source executable not found: $source" }
          $portable = "mdtxt_$env:VERSION`_windows_x64_portable.exe"
          Copy-Item $source $portable
          $hash = (Get-FileHash $portable -Algorithm SHA256).Hash.ToLower()
          "$hash  $portable" | Set-Content "$portable.sha256" -NoNewline
          gh release upload $env:TAG $portable "$portable.sha256" --clobber

  supply-chain:
    name: Checksums, SBOM, and third-party licenses
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.tag }}
      - id: syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: mdtxt-${{ needs.metadata.outputs.version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate third-party license inventory
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          {
            echo "mdtxt $VERSION third-party dependency inventory"
            echo "Generated from the release SPDX SBOM. Refer to the SBOM for package URLs and checksums."
            echo
            jq -r '.packages[] | [.name, (.versionInfo // "unknown"), (.licenseDeclared // .licenseConcluded // "NOASSERTION")] | @tsv' "mdtxt-$VERSION.spdx.json" | sort -u
          } > THIRD_PARTY_LICENSES.txt
      - name: Generate aggregate SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          mkdir release-assets
          gh release download "$TAG" --dir release-assets
          find release-assets -maxdepth 1 -type f ! -name '*.sha256' -print0 | sort -z | xargs -0 sha256sum | sed 's#  release-assets/#  #' > SHA256SUMS
          test -s SHA256SUMS
      - name: Upload release evidence
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          gh release upload "$TAG" SHA256SUMS "mdtxt-$VERSION.spdx.json" THIRD_PARTY_LICENSES.txt --clobber
