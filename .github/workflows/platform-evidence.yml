name: Platform Evidence Build

# Produces private, downloadable Debug bundles for the P10a validation matrix.
# It intentionally never creates a release, tag, updater manifest, or signing
# request. Artifact inspection and native test results are recorded separately.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    name: ${{ matrix.name }} Debug bundle
    # Debug packaging may compile the full Tauri stack from cache miss, but it
    # must still terminate with a result suitable for the P10a evidence matrix.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
            artifact: mdtxt-macos-arm64-debug
            paths: |
              src-tauri/target/debug/bundle/macos/**
              src-tauri/target/debug/bundle/dmg/**
              src-tauri/target/debug/bundle/platform-evidence.json
          - name: windows-x64
            runner: windows-latest
            artifact: mdtxt-windows-x64-debug
            paths: |
              src-tauri/target/debug/bundle/msi/**
              src-tauri/target/debug/bundle/nsis/**
              src-tauri/target/debug/bundle/platform-evidence.json
          - name: ubuntu-x64
            runner: ubuntu-24.04
            artifact: mdtxt-ubuntu-x64-debug
            paths: |
              src-tauri/target/debug/bundle/appimage/**
              src-tauri/target/debug/bundle/deb/**
              src-tauri/target/debug/bundle/rpm/**
              src-tauri/target/debug/bundle/platform-evidence.json

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Debug bundle
        shell: bash
        run: |
          # `timeout` gives Linux/AppImage packaging a hard, visible boundary.
          # The job-level limit is a last resort; this one terminates the child
          # process and preserves verbose output if an upstream packager stalls.
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            timeout --foreground --signal=TERM --kill-after=60s 30m \
              bun run tauri build --debug --verbose
          else
            bun run tauri build --debug --verbose
          fi

      - name: Write package evidence manifest
        run: node scripts/write-platform-evidence-manifest.mjs

      - name: Upload Debug bundle and manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 14
