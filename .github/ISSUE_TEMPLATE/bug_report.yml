name: 🐛 Bug report
description: Something isn't working the way it should
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! The more detail, the faster it gets fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I do X, Y happens — but I expected Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: mdtxt version
      description: See Settings → About, or the title bar.
      placeholder: e.g. 0.6.21
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS (built from source)
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / logs (optional)
      description: Drag in screenshots or paste any error output.
